---
- name: Install Oh My Zsh
  ansible.builtin.command:
    cmd: >-
      sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
    creates: "{{ ansible_env.HOME }}/.oh-my-zsh"
  tags: shell

- name: Clone OMZ custom plugins  # noqa: latest[git]
  # Intentionally track the default branch (update: false → cloned once, never updated).
  # Pinning third-party plugins to a commit isn't worth the maintenance here.
  ansible.builtin.git:
    repo: "https://github.com/{{ item }}.git"
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/{{ item.split('/')[1] }}"
    update: false
    depth: 1
  loop:
    - zsh-users/zsh-syntax-highlighting
    - zsh-users/zsh-autosuggestions
    - zsh-users/zsh-completions
    - Aloxaf/fzf-tab
  tags: shell

- name: Install Bun
  ansible.builtin.command:
    cmd: /bin/bash -c "curl -fsSL https://bun.sh/install | bash"
    creates: "{{ ansible_env.HOME }}/.bun/bin/bun"
  tags: shell

- name: Clone TPM (tmux plugin manager)  # noqa: latest[git]
  # Same as OMZ plugins: default branch, cloned once (update: false).
  ansible.builtin.git:
    repo: "https://github.com/tmux-plugins/tpm.git"
    dest: "{{ ansible_env.HOME }}/.tmux/plugins/tpm"
    update: false
    depth: 1
  tags: shell

- name: Initialize fzf-git submodule  # noqa: command-instead-of-module
  # ansible.builtin.git clones repos; it doesn't drive `submodule update` on an
  # already-checked-out superproject. The command module is the right tool here.
  ansible.builtin.command:
    cmd: git submodule update --init fzf-git.sh
    chdir: "{{ dotfiles_dir }}"
    creates: "{{ dotfiles_dir }}/fzf-git.sh/fzf-git.sh"
  tags: shell

- name: Install headroom (LLM proxy) as a uv tool  # noqa: command-instead-of-module
  # headroom ships only on PyPI, not Homebrew, so it's installed via uv (uv is in
  # brew_packages_dev). Pairs with rtk: rtk rewrites commands, headroom compresses
  # the API payloads. `uv tool install` is idempotent; `creates` skips reinstalls.
  ansible.builtin.command:
    cmd: uv tool install headroom-ai
    creates: "{{ ansible_env.HOME }}/.local/share/uv/tools/headroom-ai"
  tags: shell

- name: Reminder — install tmux plugins
  ansible.builtin.debug:
    msg: "Inside tmux, press prefix + I to install plugins via TPM."
  tags: shell

- name: Stat rtk-rewrite.sh
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.claude/hooks/rtk-rewrite.sh"
  register: rtk_hook_stat
  tags: shell

- name: Remove rtk-rewrite.sh if real file (stow will create symlink)
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.claude/hooks/rtk-rewrite.sh"
    state: absent
  when: rtk_hook_stat.stat.exists and not rtk_hook_stat.stat.islnk
  tags: shell

- name: Check if rtk PreToolUse hook in settings.json
  ansible.builtin.command:
    cmd: >
      jq -e '[.hooks.PreToolUse[]?.hooks[]?.command // ""] | any(contains("rtk-rewrite.sh"))'
      "{{ ansible_env.HOME }}/.claude/settings.json"
  register: rtk_settings_check
  failed_when: false
  changed_when: false
  tags: shell

- name: Patch ~/.claude/settings.json — PreToolUse rtk hook
  ansible.builtin.shell:  # noqa: command-instead-of-module
    cmd: |
      tmp=$(mktemp)
      jq '.hooks.PreToolUse = [{"matcher": "Bash", "hooks": [{"type": "command", "command": "{{ ansible_env.HOME }}/.claude/hooks/rtk-rewrite.sh"}]}]' \
        "{{ ansible_env.HOME }}/.claude/settings.json" > "$tmp" && mv "$tmp" "{{ ansible_env.HOME }}/.claude/settings.json"
  when: rtk_settings_check.rc != 0
  tags: shell

- name: Reminder — Claude Code token tooling (rtk + headroom)
  ansible.builtin.debug:
    msg:
      - "rtk hook ships via the `claude` stow package (~/.claude/hooks/rtk-rewrite.sh)."
      - "Do NOT run `rtk init -g` — it overwrites the hook with a bare script missing the Homebrew PATH fix (headroom#487)."
      - "Launch Claude through the proxy with the `hrclaude` alias (headroom wrap claude --no-rtk)."
  tags: shell
