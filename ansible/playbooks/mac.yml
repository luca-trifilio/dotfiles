---
- name: Configure macOS dotfiles
  hosts: all
  connection: local
  gather_facts: true

  pre_tasks:
    - name: Assert running on the expected host
      ansible.builtin.assert:
        that:
          - ansible_facts['hostname'] == expected_hostname
        fail_msg: >-
          This host's hostname ({{ ansible_facts['hostname'] }}) does not match the expected
          hostname for the '{{ machine_profile }}' profile ({{ expected_hostname }}).
          Refusing to run to avoid applying the wrong profile.
        success_msg: "Hostname {{ ansible_facts['hostname'] }} matches profile {{ machine_profile }}."
      when:
        - expected_hostname is defined
        - expected_hostname != "PLACEHOLDER_RUN_HOSTNAME_ON_PERSONAL_MAC"
      tags: always

    - name: Check sops binary is available
      ansible.builtin.stat:
        path: /opt/homebrew/bin/sops
      register: sops_stat
      tags: always

    - name: Warn if sops is not installed (vault will not be loaded)
      ansible.builtin.debug:
        msg: >-
          sops not found at /opt/homebrew/bin/sops — work vault will not be loaded.
          Run with --tags install first to install sops, then re-run.
      when:
        - "'work' in group_names"
        - not sops_stat.stat.exists
      tags: always

    - name: Load shared secrets from SOPS vault (both profiles)
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../group_vars/all/vault.sops.yaml"
      no_log: true
      ignore_errors: "{{ ansible_check_mode }}"
      when: sops_stat.stat.exists
      tags: always

    - name: Load work secrets from SOPS vault
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../group_vars/work/vault.sops.yaml"
      no_log: true
      ignore_errors: "{{ ansible_check_mode }}"
      when:
        - "'work' in group_names"
        - sops_stat.stat.exists
      tags: always

  roles:
    - homebrew
    - shell
    - stow
    - macos
