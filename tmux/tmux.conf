# ── General ────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g display-time 3000
set -g status-interval 5
set -g focus-events on
set -sg escape-time 0
set -g status-position top

setw -g mode-keys vi
set -g extended-keys on
setw -g aggressive-resize on

# ── Keybindings ────────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "  Config reloaded"

# Split panes (keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Move windows
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Kill without confirm
bind x kill-pane
bind X kill-window

# ── Copy mode (vi) ─────────────────────────────────────────────────────────────
bind Enter copy-mode
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Plugins ────────────────────────────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'

# ── vim-tmux-navigator ─────────────────────────────────────────────────────────
set -g @vim_navigator_mapping_left  "C-h"
set -g @vim_navigator_mapping_down  "C-j"
set -g @vim_navigator_mapping_up    "C-k"
set -g @vim_navigator_mapping_right "C-l"

# ── Resurrect & Continuum ──────────────────────────────────────────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# ── Catppuccin ─────────────────────────────────────────────────────────────────
source-file ~/.config/tmux/catppuccin.conf

# ── TPM ────────────────────────────────────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'

# ── Pane borders (after TPM so nothing overrides) ──────────────────────────────
source-file ~/.config/tmux/pane-borders.conf

set -g status 2
set -g status-format[1] "#[fill=#{@thm_bg}]"
