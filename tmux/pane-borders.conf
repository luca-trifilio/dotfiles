# ── Border style ───────────────────────────────────────────────────────────────
set -g pane-border-lines single   # Unicode box-drawing chars (vs. simple ASCII)
set -g pane-border-status top     # draw a bar at the top of each pane (creates the box effect)
set -g pane-border-format ""      # keep the top bar empty (no pane title/number)

# ── Colors ─────────────────────────────────────────────────────────────────────
set -g pane-active-border-style "fg=#{@thm_peach},bg=#{@thm_bg}"
set -g pane-border-style "fg=#{@thm_surface_1},bg=#{@thm_bg}"
