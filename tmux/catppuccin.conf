# ── Flavor & base ──────────────────────────────────────────────────────────────
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_background "#{@thm_bg}"
set -g @catppuccin_status_connect_separator "yes"   # must come before "no" below

# ── Windows ────────────────────────────────────────────────────────────────────
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_number_color "#{@thm_sky}"

# Active window
set -g @catppuccin_window_current_text "#[fg=#{@thm_surface_1}]#W"
set -g @catppuccin_window_current_number "#[fg=#{@thm_peach}]#I"
set -g @catppuccin_window_current_text_color "#{@thm_peach}"
set -g @catppuccin_window_current_number_color "#{@thm_surface_1}"

# ── Pane borders ───────────────────────────────────────────────────────────────
set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_pane_border_status "yes"
set -g @catppuccin_pane_active_border_style "##{?pane_in_mode,fg=#{@thm_peach},##{?pane_synchronized,fg=#{@thm_rosewater},fg=#{@thm_peach}}}"
set -g @catppuccin_pane_color "#{@thm_surface_1}"

# ── Status bar separators ───────────────────────────────────────────────────────
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "

# ── Status module colors ────────────────────────────────────────────────────────
set -g @catppuccin_cpu_color "#{@thm_mauve}"
set -g @catppuccin_ram_color "#{@thm_teal}"
set -g @catppuccin_date_time_text " %H:%M"

# ── Load plugin ─────────────────────────────────────────────────────────────────
# Must run before building status line so @thm_* variables are defined
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# ── Status line layout ──────────────────────────────────────────────────────────
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -g status-left "#{E:@catppuccin_status_session}"
set -ag  status-right "#{E:@catppuccin_status_date_time}"
