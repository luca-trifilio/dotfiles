# Auto-start tmux
startup_session session

# Theme: Catppuccin Macchiato
# Download with:
#   curl -o ~/.config/kitty/catppuccin-macchiato.conf \
#     https://raw.githubusercontent.com/catppuccin/kitty/main/themes/macchiato.conf
include catppuccin-macchiato.conf

# Font
font_family      JetBrainsMono Nerd Font Mono
font_size        14.0

# Padding: x=32, y=32 top / 0 bottom (top right bottom left)
window_padding_width 32 32 0 32

# No close confirmation
confirm_os_window_close 0

# Option key sends alt characters (false = keep as Option for accents)
macos_option_as_alt no

# Shift+Enter → CSI u encoding
map shift+enter send_text all \x1b[13;2u
