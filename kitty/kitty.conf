include catppuccin-macchiato.conf

# Font
font_family      JetBrainsMono Nerd Font Mono
font_size        14.0

# Padding: sides=32, top+bottom=16
window_padding_width 16 32

# No close confirmation
confirm_os_window_close 0

# Cursor
cursor_trail 3

# Background
background_opacity 0.8
background_blur 40

hide_window_decorations titlebar-only

# Option key sends alt characters (false = keep as Option for accents)
macos_option_as_alt no

# Shift+Enter → CSI u encoding
map shift+enter send_text all \x1b[13;2u

# Tab navigation
map cmd+] next_tab
map cmd+[ prev_tab
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
