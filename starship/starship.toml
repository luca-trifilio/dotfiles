"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_macchiato"
add_newline = true

format = "$directory$character"
right_format = "${custom.git_server}$git_branch${custom.git_dirty}$git_status"

[character]
success_symbol = "[[󰄛](green) ❯](peach)"
error_symbol = "[[󰄛](red) ❯](peach)"
vimcmd_symbol = "[󰄛 ❮](subtext1)"

[directory]
truncation_length = 100
truncate_to_repo = false
style = "bold lavender"
read_only = " 󰌾"
read_only_style = "overlay2"

[git_branch]
style = "bold mauve"
symbol = " "
format = "[$symbol$branch(:$remote_branch)]($style) "

[custom.git_server]
description = "Display GitHub icon when remote is GitHub"
command = 'echo ""'
when = 'git remote get-url origin 2>/dev/null | grep -q github'
style = "bold blue"
format = "[$output]($style) "

[custom.git_dirty]
description = "Show * when repo has any uncommitted changes"
command = 'echo "*"'
when = 'git status --porcelain | grep -q .'
style = "bold teal"
format = '[$output]($style) '

[git_status]
format = '($ahead_behind )'
ahead = "⇡$count"
behind = "⇣$count"
diverged = "⇡$ahead_count⇣$behind_count"


[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"

sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
